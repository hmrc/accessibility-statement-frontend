serviceName: Cofrestru ar gyfer y cynllun Troi Treth yn Ddigidol ar gyfer Treth Incwm
serviceDescription: |
  Mae’r gwasanaeth hwn yn eich galluogi i gofrestru’ch busnes i gyflwyno diweddariadau treth incwm gan ddefnyddio meddalwedd sy’n cydweddu.
serviceDomain: www.tax.service.gov.uk
serviceUrl: /report-quarterly/income-and-expenses/sign-up
contactFrontendServiceId: MTDID
complianceStatus: partial
accessibilityProblems:
  - Drwy gydol y gwasanaeth, mae penawdau nad ydynt wedi’u marcio’n gywir, felly ni fyddant yn cael eu darllen yn gywir gan ddarllenwyr sgrin.
  - Ar y dudalen lle mae defnyddwyr wedi dewis cadw eu hatebion a dod yn ôl yn nes ymlaen, nid yw teitl y dudalen yn disgrifio cynnwys y dudalen yn ddigonol.
  - Mae pennawd gwag ar dudalen ‘Cadw a dod yn ôl yn nes ymlaen’ a all gael ei ddarllen fel pennawd gwag gan ddarllenwyr sgrin.
  - Ar y dudalen ‘Dewis sut i gael eich llythyrau treth’, mae rhestr nad yw wedi’i gosod yn gywir a gall achosi problemau gyda’r ffordd y caiff ei darllen gan ddarllenwyr sgrin.
  - Mae tabl ar y dudalen ‘Rydych wedi gorffen cofrestru’ nad oes ganddo gapsiwn, felly efallai na fydd darllenwyr sgrin sy’n llywio drwy dablau yn gallu adnabod pwrpas y tabl.
  - Ar rai o’r tudalennau dyddiad dechrau, os nad yw defnyddwyr yn nodi gwerth caniataol yn y maes diwrnod, caiff y meysydd diwrnod a blwyddyn eu hamlygu. Mae hyn yn ei gwneud yn anodd gwybod pa faes sy’n achosi’r gwall.
  - Ar y dudalen ‘Gwirio’ch atebion’ terfynol, defnyddir testun mewn print trwm i ddangos bod defnyddwyr mewn adran newydd. Mae hyn yn achosi i’r adran ymddangos fel tabl pan nad yw’n un. Gall defnyddwyr darllenwyr sgrin sy’n rhannol ddall geisio gwe-lywio drwy dabl, ond ni fyddant yn gallu dod o hyd i un ar y dudalen.
  - Ar PDFs a gynhyrchir gan ddefnyddwyr sy’n cadw gwybodaeth y dudalen gadarnhau, nid oes label ar gysylltiad logo GOV.UK, ac mae’n cael ei darllen fel gwerth gwag i ddefnyddwyr darllenwyr sgrin.
  - Nid yw’r PDFs a gynhyrchir gan ddefnyddwyr sy’n cadw gwybodaeth y dudalen gadarnhau wedi’u codio’n gywir, ac efallai na fydd darllenwyr sgrin yn ynganu’r geiriau’n gywir.
  - Gall y meysydd ar gyfer enw’r busnes a’r cyfeiriad e-bost ganiatáu i ddefnyddwyr lenwi’r manylion hyn o ddata sydd wedi’i gadw yn eu porwr.
  - Dangosir gwahanol fersiynau o’r togl Cymraeg drwy gydol y gwasanaeth. Gall hyn achosi dryswch wrth newid yr iaith.
  - Ar y tudalennau ‘Gwirio atebion’, mae nifer o gysylltiadau ‘newid’ sy’n mynd i’r un dudalen, er bod ganddynt destun gysylltu gwahanol sydd wedi’i guddio o’r golwg. Gall hyn fod yn ddryslyd i ddefnyddwyr darllenydd sgrin.
  - Pan gaiff y Gymraeg ei dewis, mae sawl enghraifft o destun ‘Gwall’ sydd wedi’i guddio o’r golwg heb gael ei gyfieithu i’r Gymraeg. Efallai na fydd y testun hwn yn cael ei ynganu’n gywir gan ddarllenwyr sgrin gan nad yw wedi’i farcio gyda’r briodoledd iaith gywir.
